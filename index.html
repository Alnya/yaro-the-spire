<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>YARO the Spire</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="TemplateData/icons/yaro-the-spire-icon.png">
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
  </div>

  <!-- PWAインストール促進バナー -->
  <div id="pwa-install-banner" style="display:none;">
    <div class="pwa-install-content">
      <p class="pwa-install-text">オフライン版をインストール！</p>
      <p class="pwa-install-instruction" id="pwa-install-instruction"></p>
      <button id="pwa-install-close" class="pwa-install-close">閉じる</button>
    </div>
  </div>


  <script>
    window.addEventListener("load", async () => {
      if ("serviceWorker" in navigator) {
        try {
          const reg = await navigator.serviceWorker.register("./ServiceWorker.js");
          console.log("Service Worker登録成功", reg);
        } catch (e) {
          console.error("Service Worker登録失敗", e);
        }
      }

      let auth = localStorage.getItem("auth");
      if (!auth) {
        if (!location.pathname.endsWith("/Auth")) {
          location.replace("/yaro-the-spire/Auth");
          return;
        }
      }
    });

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    // Shows a temporary message banner/ribbon for a few seconds, or
    // a permanent error message on top of the canvas if type=='error'.
    // If type=='warning', a yellow highlight color is used.
    // Modify or remove this function to customize the visually presented
    // way that non-critical warnings and error messages are presented to the
    // user.
    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "./Build";
    var loaderUrl = buildUrl + "/YTSBuild0722.loader.js";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/YTSBuild0722.data.unityweb",
      frameworkUrl: buildUrl + "/YTSBuild0722.framework.js.unityweb",
      codeUrl: buildUrl + "/YTSBuild0722.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "YARO the Spire",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    // By default Unity keeps WebGL canvas render target size matched with
    // the DOM size of the canvas element (scaled by window.devicePixelRatio)
    // config.matchWebGLToCanvasSize = false;

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      // Mobile device style: fill the whole browser client area with the game canvas:
      container.className = "unity-mobile";
    }

    // canvas サイズをデバイスに合わせて設定（タッチ座標ズレ防止）
    function resizeCanvas() {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    loadingBar.style.display = "block";

    // ===== ミニゲーム: ロゴバウンス & プログレスバースライド =====
    (function () {
      var logo = document.querySelector("#unity-logo");
      var bar = document.querySelector("#unity-progress-bar-empty");
      var loadBar = document.querySelector("#unity-loading-bar");

      // --- ロゴの初期配置 ---
      var logoW = 154, logoH = 130;
      var barW = 141, barH = 18;
      var logoX, logoY, logoVx, logoVy;
      var logoSpeed = 3;

      function getAreaW() { return window.innerWidth; }
      function getAreaH() { return window.innerHeight; }

      // ランダム初期位置（画面中央寄り）
      logoX = (getAreaW() - logoW) / 2;
      logoY = (getAreaH() - logoH) / 2;

      // ランダム方向
      var angle = Math.random() * Math.PI * 2;
      logoVx = Math.cos(angle) * logoSpeed;
      logoVy = Math.sin(angle) * logoSpeed;

      // --- プログレスバーの初期配置（画面下部中央）---
      var barX = (getAreaW() - barW) / 2;
      var barY = getAreaH() - 60;

      // --- ランダム色変更用 (hue-rotate filter) ---
      var randomAngleRange = 25 * Math.PI / 180; // ±25°
      function addRandomAngle() {
        var speed = Math.sqrt(logoVx * logoVx + logoVy * logoVy);
        var angle = Math.atan2(logoVy, logoVx);
        angle += (Math.random() * 2 - 1) * randomAngleRange;
        logoVx = Math.cos(angle) * speed;
        logoVy = Math.sin(angle) * speed;
      }
      function randomColor() {
        var hue = Math.floor(Math.random() * 360);
        logo.style.filter = "hue-rotate(" + hue + "deg) brightness(1.2)";
      }

      // --- ロゴのバウンスアニメーション ---
      function updateLogo() {
        // バウンス移動
        logoX += logoVx;
        logoY += logoVy;

        // 画面端反射
        if (logoX <= 0) {
          logoX = 0;
          logoVx = -logoVx;
          addRandomAngle();
          randomColor();
        }
        if (logoX + logoW >= getAreaW()) {
          logoX = getAreaW() - logoW;
          logoVx = -logoVx;
          addRandomAngle();
          randomColor();
        }
        if (logoY <= 0) {
          logoY = 0;
          logoVy = -logoVy;
          addRandomAngle();
          randomColor();
        }
        if (logoY + logoH >= getAreaH()) {
          logoY = getAreaH() - logoH;
          logoVy = -logoVy;
          addRandomAngle();
          randomColor();
        }

        logo.style.left = logoX + "px";
        logo.style.top = logoY + "px";
      }

      // --- プログレスバーのスライド操作 ---
      var dragging = false;
      var dragOffsetX = 0;

      function onDragStart(clientX) {
        dragging = true;
        dragOffsetX = clientX - barX;
        bar.style.cursor = "grabbing";
      }
      function onDragMove(clientX) {
        if (!dragging) return;
        barX = clientX - dragOffsetX;
        // 画面内に制限
        if (barX < 0) barX = 0;
        if (barX + barW > getAreaW()) barX = getAreaW() - barW;
      }
      function onDragEnd() {
        dragging = false;
        bar.style.cursor = "grab";
      }

      // マウスイベント
      bar.addEventListener("mousedown", function (e) {
        e.preventDefault();
        onDragStart(e.clientX);
      });
      window.addEventListener("mousemove", function (e) {
        onDragMove(e.clientX);
      });
      window.addEventListener("mouseup", function () {
        onDragEnd();
      });

      // タッチイベント
      bar.addEventListener("touchstart", function (e) {
        e.preventDefault();
        onDragStart(e.touches[0].clientX);
      }, { passive: false });
      window.addEventListener("touchmove", function (e) {
        if (dragging) {
          onDragMove(e.touches[0].clientX);
        }
      }, { passive: true });
      window.addEventListener("touchend", function () {
        onDragEnd();
      });

      // --- 衝突判定 ---
      var colliding = false;
      function checkCollision() {
        // AABB衝突
        var hit = logoX < barX + barW &&
          logoX + logoW > barX &&
          logoY < barY + barH &&
          logoY + logoH > barY;
        if (hit && !colliding) {
          colliding = true;
          // ロゴの中心とバーの中心の位置関係から反射方向を決定
          var logoCenterX = logoX + logoW / 2;
          var logoCenterY = logoY + logoH / 2;
          var barCenterX = barX + barW / 2;
          var barCenterY = barY + barH / 2;

          // 重なり量を計算して、最も浅い方向で反射
          var overlapLeft = (logoX + logoW) - barX;
          var overlapRight = (barX + barW) - logoX;
          var overlapTop = (logoY + logoH) - barY;
          var overlapBottom = (barY + barH) - logoY;
          var minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

          if (minOverlap === overlapLeft) {
            // 左側面に当たった
            logoX = barX - logoW;
            logoVx = -Math.abs(logoVx);
          } else if (minOverlap === overlapRight) {
            // 右側面に当たった
            logoX = barX + barW;
            logoVx = Math.abs(logoVx);
          } else if (minOverlap === overlapTop) {
            // 上から当たった
            logoY = barY - logoH;
            logoVy = -Math.abs(logoVy);
          } else {
            // 下から当たった
            logoY = barY + barH;
            logoVy = Math.abs(logoVy);
          }
          addRandomAngle();
          randomColor();
        } else if (!hit) {
          colliding = false;
        }
      }

      // --- メインループ ---
      var animId;
      function gameLoop() {
        // ロード完了時にアニメーション停止
        if (loadBar.style.display === "none") {
          cancelAnimationFrame(animId);
          return;
        }
        updateLogo();
        bar.style.left = barX + "px";
        bar.style.top = barY + "px";
        checkCollision();
        animId = requestAnimationFrame(gameLoop);
      }
      animId = requestAnimationFrame(gameLoop);

      // リサイズ時にバーのY位置を再計算
      window.addEventListener("resize", function () {
        barY = getAreaH() - 60;
        if (barX + barW > getAreaW()) barX = getAreaW() - barW;
      });
    })();
    // ===== ミニゲーム ここまで =====

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);

    // PWAインストール促進バナー
    (function () {
      // PWAとして起動しているか判定
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.matchMedia('(display-mode: fullscreen)').matches
        || window.navigator.standalone === true;

      // モバイルデバイスか判定
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      if (isMobile && !isStandalone) {
        var banner = document.getElementById('pwa-install-banner');
        var instruction = document.getElementById('pwa-install-instruction');

        if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
          instruction.innerHTML = '共有ボタン <span style="font-size:1.4em;">&#x1F4E4;</span> →「ホーム画面に追加」をタップ';
        } else {
          instruction.innerHTML = 'メニュー <span style="font-size:1.4em;">&#x22EE;</span> →「ホーム画面に追加」をタップ';
        }

        // 既に閉じたことがあるか確認（1日に1回だけ表示）
        var dismissed = sessionStorage.getItem('pwa-banner-dismissed');
        if (!dismissed || (Date.now() - parseInt(dismissed)) > 24 * 60 * 60 * 1000) {
          banner.style.display = 'flex';
        }

        document.getElementById('pwa-install-close').addEventListener('click', function () {
          banner.style.display = 'none';
          sessionStorage.setItem('pwa-banner-dismissed', Date.now().toString());
        });
      }
    })();
  </script>
</body>

</html>
